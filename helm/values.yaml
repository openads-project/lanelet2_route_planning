its-module:
  name: lanelet2-route-planning
  imageName: ghcr.io/openads-project/lanelet2_route_planning
  imageTag: v1.2.0
  command:
  - /bin/bash
  - -ic
  args:
  - |
    ros2 launch lanelet2_route_planning lanelet2_route_planning_launch.py \
      namespace:=${NAMESPACE} \
      name:=${NAME} \
      log_level:=${LOG_LEVEL} \
      use_sim_time:=${USE_SIM_TIME} \
      params:=${PARAMS} \
      ego_data_topic:=${EGO_DATA_TOPIC} \
      route_topic:=${ROUTE_TOPIC}
  env:
    # --- name ------
    NAMESPACE: /
    NAME: lanelet2_route_planning
    # --- inputs ----
    EGO_DATA_TOPIC: ~/ego_data
    # --- outputs ---
    ROUTE_TOPIC: ~/route
    # --- other -----
    LOG_LEVEL: ${LOG_LEVEL:-info}
    USE_SIM_TIME: ${USE_SIM_TIME:-false}
    PARAMS: ${PARAMS:-/docker-ros/ws/install/lanelet2_route_planning/share/lanelet2_route_planning/config/params.yml}
  rosParamFileMountPath: /docker-ros/ws/install/lanelet2_route_planning/share/lanelet2_route_planning/config/params.yml
  rosParamFileData: null
